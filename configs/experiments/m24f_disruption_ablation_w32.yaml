# M24f Stage 2a — MECHANISM ablation for the M24f mixer win on `disruption` (w=32).
#
# Stage 1 showed the mixer SOLVES disruption (Δ(mixer−ff) EM +0.49, 8/0) while the flat loop sits on
# ff (M22 null replicated). This asks the attribution question, exactly as M24b did on converge: is
# that win the SAME joint-state coherence mechanism the program already found (leg-1, §9.2 — which
# M22 confirmed reproduces on disruption, trainability-clean stepDS Δ +0.127), or a NEW capability
# from the explicit cross-cell propagation operator? Flat loop = PIVOT; add the two §9.2 controls:
#   - Δ(trm_flat − trm_decoupled)  = leg-1 joint-state WITHOUT mixing (decoupled = per-cell latents, M10)
#   - Δ(trm_mixer − trm_flat)      = the MIXING operator's marginal ON TOP of joint-state (both joint)
#   - Δ(trm_flat − untied_matched) = P1 tying WITHOUT mixing
# If the mixing marginal DWARFS leg-1, the mixer is a distinct capability, not leg-1 done better.
# CAVEAT (M10/M22): trm_decoupled is fragile under DS + has a 3-D-matmul num_threads caveat — read
# Δ(flat−decoupled) as the leg-1 DIRECTION (check train_acc in the JSON); the clean statistic is
# Δ(mixer−flat), both arms train to ~1.0. Recipe = the M24 winner (standard train + deep supervision
# + RMSNorm on loop arms + full BPTT); distractors=0 (mixer constraint, identical across arms);
# num_threads=1 (mixer AND decoupled 3-D matmuls). gamma=14 (minimal-PSD @ w32, Stage-0 confirmed).
task:
  name: disruption
  params:
    w: 32
    n_banks: 4
    w_rot: 6
    w_bank: 3
    min_tail: 2
    max_tail: 8
    gamma: 15
    distractors: 0
  n_train: 4000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

arms:
  - name: trm_mixer
    label: trm_mixer
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 192
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm
    label: trm_flat
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm_decoupled
    label: trm_decoupled     # leg-1 control: per-cell independent latents (no joint state, no mixing)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
  - name: untied_matched
    label: untied_matched    # P1 control: untied stack at the loop's budget (no tying, no mixing)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
  - name: ff_matched
    label: ff_matched
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8

deltas:
  - [trm_mixer, trm_flat]        # MIXING marginal on top of joint-state (trainability-clean)
  - [trm_flat, trm_decoupled]    # leg-1 joint-state WITHOUT mixing
  - [trm_mixer, trm_decoupled]   # total (joint + mixing) vs per-cell
  - [trm_flat, untied_matched]   # P1 tying WITHOUT mixing
  - [trm_mixer, untied_matched]  # mixer vs untied (conflates mixing+tying — context only)
  - [trm_flat, ff_matched]       # sanity: flat loop ~ ff (M22/Stage-1 replication)

train:
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

budget_reference: trm_flat
budget_tol: 0.05

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
