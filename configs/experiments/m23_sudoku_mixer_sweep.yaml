# M23 MIXER re-test — the decisive experiment from the adversarial review. The M23 "positive control"
# was confounded: our flat `trm` concatenates the grid into ONE vector and can't express constraint
# propagation. This adds `trm_mixer` — a weight-tied loop whose update is an MLP-MIXER over the size²
# cells (token-mixing across cells = the propagation operator the TRM paper credits for Sudoku,
# 74.7%→87.4%) — and re-runs the easy→hard sweep against the SAME flat `trm` and `ff_matched`, all
# param-matched to ~121k (±0.6%). One knob changed vs M23: the architecture (mixing operator);
# training is unchanged (full BPTT, deep supervision) so this isolates (A) from the 1-step-gradient (B).
#   OVERTURNS the M23 negative if Δ(trm_mixer − ff) EM GROWS (or survives) as puzzles harden
#     (n_givens 30→24→18) — TRM's real signature — where the flat trm's edge REVERSED.
#   STRENGTHENS the negative if trm_mixer's edge also reverses even with cell-mixing.
task:
  name: sudoku
  params:
    size: 6
  n_train: 16000
  n_test: 2000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

sweep:
  param: n_givens
  values: [30, 24, 18, 14]   # easy → medium → hard → very hard (find the mixer's ceiling)

arms:
  - name: trm_mixer
    label: trm_mixer
    hidden_dim: 272        # channel MLP hidden
    latent_dim: 192
    token_hidden: 64       # token-mixing MLP width (the cross-cell operator) — ~121k params
    n_steps: 16
    n_latent: 2
    use_rmsnorm: true
    deep_supervision: true
  - name: trm
    label: trm_flat
    hidden_dim: 128
    latent_dim: 128
    n_steps: 16
    n_latent: 2
    use_rmsnorm: true
    deep_supervision: true
  - name: ff_matched
    label: ff_matched
    hidden_dim: 128
    latent_dim: 128
    n_steps: 16

deltas:
  - [trm_mixer, ff_matched]   # does the MIXING loop's edge grow with difficulty? (the headline)
  - [trm_mixer, trm_flat]     # does cell-mixing beat the flat loop?
  - [trm_flat, ff_matched]    # sanity: the flat loop's edge should reverse (M23 replication)

train:
  epochs: 60
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

budget_reference: trm_flat
budget_tol: 0.05

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
