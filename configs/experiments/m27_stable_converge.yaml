# M27 (main) — does a CONTRACTIVE loop hold under over-unroll where the plain loop DECAYS, and
# what does contraction COST the coherence win? The converge (fixed-point) WIN regime.
#
# WHY here. M8 found the strongest form of the null: over-unrolling the loop R'>R DECAYS even on a
# genuine fixed-point target (s_inf), so the loop bakes in a fixed-depth circuit, not an
# iterate-to-convergence operator (corroborated dynamically by M21: ρ>1, residual ~1.2). Contraction
# is the NATURAL fix exactly here — a contractive map has a stable fixed point that over-unrolling
# should approach, not overshoot. So this is the cleanest place to test the M21 lever.
#
# TWO pre-registered axes (§8 — judge the arm against BOTH; the loop wins WHILE non-contractive, so
# forcing contraction is a bet on a different capability and may trade the win away):
#   (1) EXTRAPOLATION / test-time compute: read accuracy-&-EM vs R' at T_test=6 (the target ignores
#       T, so hold T, sweep R'). Does trm_stable HOLD or RISE as R'↑ (approaching its fixed point)
#       while plain trm DECAYS (the M8 signature)? A stable-holds / plain-decays split is the first
#       test-time-compute signal in the repo. If BOTH decay → contraction did not buy stability here
#       (report plainly; the null STANDS and the M21 lever is closed).
#   (2) COHERENCE COST: Δ(trm_stable − trm) on EM / coherence_excess at the trained depth. A drop is
#       the price of contraction; Δ(trm − ff_matched) confirms the win is still there to trade.
# The *_diagnostics.csv side-car confirms the manipulation landed: trm_stable should show
# spectral_radius_mean<1, frac_expanding→0, higher za_alignment, smaller acc_overunroll_drop.
#
# §4 controls shipped: ff_matched (§4a), untied_matched (§4b fixed-depth), trm_decoupled (leg-1).
# Pin jac_reg_weight from the m27_stable_screen elbow (placeholder 1e-2 below — update after screen).

task:
  name: converge
  params:
    w: 24
    T: 6
    rule: 78
    distractors: 0
  n_train: 4000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

arms:
  - name: trm
    label: trm_stable          # contraction-regularized loop — the hypothesis
    hidden_dim: 64
    latent_dim: 64
    n_steps: 6
    deep_supervision: true
    jac_reg_weight: 1.0e-2      # ← pin from m27_stable_screen
  - name: trm
    label: trm                 # non-contractive loop (M8/M21 baseline) — the coherence-cost pivot
    hidden_dim: 64
    latent_dim: 64
    n_steps: 6
    deep_supervision: true
  - name: trm_decoupled
    label: trm_decoupled       # leg-1 joint-state control
    hidden_dim: 64
    latent_dim: 64
    n_steps: 6
    deep_supervision: true
  - name: ff_matched
    label: ff_matched          # §4a param-matched shallow control
    hidden_dim: 64
    latent_dim: 64
    n_steps: 6
  - name: untied_matched
    label: untied_matched      # §4b fair fixed-depth control (cannot over-unroll)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 6
    deep_supervision: false

deltas:
  - [trm_stable, trm]          # THE cost axis: what contraction trades on EM/coherence
  - [trm_stable, ff_matched]   # does the contractive loop still beat the shallow MLP?
  - [trm, ff_matched]          # the coherence win is present to trade (M9 anchor)
  - [trm, trm_decoupled]       # leg-1 joint-state (present for both loops)

budget_reference: trm          # trm_stable is param-identical to trm (ratio 1.000)
budget_ceiling: []
budget_tol: 0.02

diagnostics:
  enabled: true
  overunroll_factor: 4
  n_random_inits: 5
  power_iter_steps: 20
  jac_n_examples: 8

train:
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

extrapolation:
  T_values: [6]                # target is the fixed point (T-independent); hold T, sweep R'
  R_values: [6, 8, 12, 16, 24] # over-unroll: does trm_stable HOLD where trm DECAYS?

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
