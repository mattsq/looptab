# M28b — carry the cross-cell MIXER re-test to `nested_converge` (the Task C substrate).
# MECHANISM ablation (M24b-style, budget_reference=trm_flat), at the 4k plateau regime.
#
# nested_converge is a TWO-TIMESCALE fixed point (inner=13 per-block ring relax, outer=79 full-ring
# coupling), local + deep + ff-hard, cross-cell coupled with a shared block/ring topology. M18g/M18i/
# M18j concluded (ON THE FLAT LOOP) that the single-timescale loop plateaus below target and a
# feedforward SHARES the ceiling ⇒ a capacity/data wall, not a single-TIMESCALE deficit ⇒ M19 (H/L)
# NOT earned; data is the lever (4k→64k EM 0.75→0.99, M18j). The mixer re-test asks the natural
# follow-up: does the CROSS-CELL mixer crack the nested target at 4k where the flat loop plateaued?
#   - mixer SOLVES at 4k ⇒ the M18 plateau was FLAT-arch + data-bound; Task C stays firmly CLOSED
#     (a single-timescale MIXER solves the nested target — §9.3's own null clause, now on the mixer).
#   - mixer plateaus at 4k too ⇒ read the untied config (m28b_nested_converge_untied): only a §9.3
#     re-gate CANDIDATE if the non-recurrent untied_mixer does NOT share the ceiling (do NOT build
#     M19 off this run alone — needs equal-compute + data checks).
# Pivot on the flat loop; same mechanism deltas as M28a. Recipe = M24 winner (standard train + deep
# supervision + RMSNorm + full BPTT). distractors=0 EVERY arm (mixer divisibility; differs from M18's
# distractors=8 ⇒ not directly comparable to the M18 flat numbers, the within-config Δ is the result).
# num_threads=repo-default 1 (mixer/decoupled 3-D matmul). grid n_blocks [3,4] ⇒ w 24/32.
task:
  name: nested_converge
  params:
    block_w: 8
    inner_rule: 13
    outer_rule: 79
    T: 6
    distractors: 0
  n_train: 4000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

grid:
  params:
    n_blocks: [3, 4]   # w = 24, 32

arms:
  - name: trm_mixer
    label: trm_mixer
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 48
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm
    label: trm_flat
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm_decoupled
    label: trm_decoupled     # leg-1 control: per-cell independent latents (no joint state, no mixing)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
  - name: untied_matched
    label: untied_matched    # P1 control: untied stack at the loop's budget (no tying, no mixing)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
  - name: ff_matched
    label: ff_matched
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8

deltas:
  - [trm_mixer, trm_flat]        # MIXING marginal on top of joint-state (trainability-clean)
  - [trm_flat, trm_decoupled]    # leg-1 joint-state WITHOUT mixing
  - [trm_mixer, trm_decoupled]   # total (joint + mixing) vs per-cell
  - [trm_flat, untied_matched]   # P1 tying WITHOUT mixing
  - [trm_mixer, ff_matched]      # HEADLINE: does the mixer crack the nested target the flat loop plateaus on?
  - [trm_flat, ff_matched]       # sanity: flat loop ~ ff (M18g replication at this recipe)

train:
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

budget_reference: trm_flat
budget_tol: 0.05

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
