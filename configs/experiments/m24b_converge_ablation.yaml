# M24b ‚Äî MECHANISM ablation for the M24 mixer win on `converge`.
#
# M24 showed the mixer SOLVES converge (Œî(mixer‚àíff)/(mixer‚àíflat) EM huge and GROWING with w). This asks
# the attribution question: is that win the SAME joint-state coherence mechanism the program already found
# (leg-1, ¬ß9.2), or a NEW capability from the explicit cross-cell propagation operator? We use the flat
# loop as the PIVOT and add the two ¬ß9.2 mechanism controls to the exact M24 setup (same task, recipe,
# widths, seeds ‚Äî the ONLY new variable is the two extra arms):
#   - Œî(trm_flat ‚àí trm_decoupled)  = leg-1 joint-state effect WITHOUT mixing (flat is joint; decoupled is
#                                    per-cell independent latents ‚Äî the M10 ablation)
#   - Œî(trm_mixer ‚àí trm_flat)      = the MIXING operator's marginal ON TOP of joint-state (both arms are
#                                    joint + train fine ‚áí trainability-clean; M24 already: +0.20‚Üí+0.86, growing)
#   - Œî(trm_flat ‚àí untied_matched) = P1 tying WITHOUT mixing
# If the mixing marginal DWARFS leg-1 and grows with w, the mixer is a NEW capability, not just leg-1 done
# better. CAVEAT (M10): trm_decoupled is fragile under final-loss-only DS, so read Œî(flat‚àídecoupled) as the
# leg-1 DIRECTION here (check train acc in the JSON before over-reading its magnitude); the clean statistic
# is Œî(mixer‚àíflat), where both arms train to ~1.0. There is no untied-MIXER arm, so Œî(mixer‚àíuntied) conflates
# mixing+tying and is context only. Recipe = M24 winner (standard train + deep supervision + RMSNorm on the
# loop arms + full BPTT); distractors=0 (mixer constraint, identical across arms); num_threads=1 (3-D matmul
# in mixer AND decoupled ‚áí bit-repro only at fixed threads). Budget: all within ¬±5% except mixer @ w48
# (0.869, the documented CONSERVATIVE under-budget breach ‚Äî a mixer win there is despite fewer params).
task:
  name: converge
  params:
    rule: 78
    distractors: 0
  n_train: 4000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

sweep:
  param: w
  values: [24, 32, 48]

arms:
  - name: trm_mixer
    label: trm_mixer
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 48
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm
    label: trm_flat
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm_decoupled
    label: trm_decoupled     # leg-1 control: per-cell independent latents (no joint state, no mixing)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
  - name: untied_matched
    label: untied_matched    # P1 control: untied stack at the loop's budget (no tying, no mixing)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
  - name: ff_matched
    label: ff_matched
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8

deltas:
  - [trm_mixer, trm_flat]        # MIXING marginal on top of joint-state (trainability-clean)
  - [trm_flat, trm_decoupled]    # leg-1 joint-state WITHOUT mixing
  - [trm_mixer, trm_decoupled]   # total (joint + mixing) vs per-cell
  - [trm_flat, untied_matched]   # P1 tying WITHOUT mixing
  - [trm_mixer, untied_matched]  # mixer vs untied (conflates mixing+tying ‚Äî context only)
  - [trm_flat, ff_matched]       # sanity: flat loop ~ ff (M24 replication)

train:
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

budget_reference: trm_flat
budget_tol: 0.05

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
