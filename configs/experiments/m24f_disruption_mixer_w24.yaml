# M24f — carry the M24 cross-cell MIXER re-test to the airline `disruption` task (w=24).
#
# M22 evaluated `disruption` with the FLAT loop and found leg-2 NULL/NEG (loop ≤ ff: Δ(trm−ff) acc
# −0.025 0/8, EM −0.128 1/7 ns; ff the best arm). M24 then showed a cell-MIXING loop (`trm_mixer`)
# beats a param-matched ff wherever outputs are CROSS-CELL COUPLED — local `converge` AND dense
# `hopfield` — while the flat loop ≈ ff. `disruption` IS cross-cell coupled (rotation-chain LOCAL +
# bank-clique NON-LOCAL), so this re-tests whether M22's null was a FLAT-ARCHITECTURE artifact
# (M23/M24 pattern) or a real "coupling too sparse to exploit" negative (the `multi_parity` side).
#
# distractors=0 for ALL arms: the mixer needs in_features % out_features == 0 (144 % 24 = 0,
# cell_dim = 2+n_banks = 6). Distractors are appended to X AFTER y is built, so y / gamma / PSD
# convergence / copy_frac(0.82) / em_baseline(0.04) are byte-identical to M22 — only ff/linear
# separability can shift, and the Stage-0 screen confirmed the task stays ff-HARD (linear EM 0.231,
# same as M22 ~0.23). Standard `train` recipe (no curriculum) + deep supervision + RMSNorm + full
# BPTT, the cell-mixing operator the ONLY changed variable vs trm_flat. num_threads = repo default 1
# (mixer 3-D matmul determinism). Mixer sized token_hidden=192 (widened from M24's 48 because
# cell_dim=6 here makes the flat-TRM input projection dominate) → budget-clean vs trm_flat (verify
# in the emitted *_params.csv). gamma=14 = the MINIMAL-PSD int for task_seed=42 at w=24.
task:
  name: disruption
  params:
    w: 24
    n_banks: 4
    w_rot: 6
    w_bank: 3
    min_tail: 2
    max_tail: 8
    gamma: 14
    distractors: 0
  n_train: 4000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

arms:
  - name: trm_mixer
    label: trm_mixer
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 192
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm
    label: trm_flat
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: ff_matched
    label: ff_matched
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8

deltas:
  - [trm_mixer, ff_matched]   # HEADLINE: does the mixer rescue disruption?
  - [trm_mixer, trm_flat]     # mixing marginal (one knob)
  - [trm_flat, ff_matched]    # sanity: replicate the M22 leg-2 NULL (flat ≤ ff)

train:
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

budget_reference: trm_flat
budget_tol: 0.05

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
