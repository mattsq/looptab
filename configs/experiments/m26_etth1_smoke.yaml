# M26 SMOKE — pipeline tripwire for the ETTh1 forecasting-regression bridge (fast; not a result).
# 3 arms, 2 epochs, capped train, 3 seeds — just checks the regression path runs end-to-end and
# emits MSE/MAE/R² curves + deltas. The real run is m26_etth1_forecast.yaml.

task:
  name: etth1
  objective: regression
  params:
    lookback: 96
    horizon: 24
    n_folds: 10
    test_frac: 0.3
  n_train: 2000          # cap (full is ~12k windows) — smoke only
  n_test: 400
  task_seed: 0

arms:
  - name: trm_mixer
    label: trm_mixer
    hidden_dim: 224
    latent_dim: 96
    token_hidden: 8
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm
    label: trm_flat
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: ff_matched
    label: ff_matched
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8

deltas:
  - [trm_mixer, ff_matched]
  - [trm_mixer, trm_flat]
  - [trm_flat, ff_matched]

budget_reference: trm_flat
budget_tol: 0.05

train:
  epochs: 2
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 128
  device: cpu

seeds: [0, 1, 2]
parallel_workers: 3
results_dir: results
