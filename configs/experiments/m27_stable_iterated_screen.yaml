# M27 (iterated screen) — find the weight that ACTUALLY makes the loop contractive on the
# NON-CONVERGENT map, so the OOD cross-check tests contraction and not "weak reg".
#
# WHY (adversarial-review fix A2). The first m27_stable_iterated_extrap run pinned the CONVERGE
# elbow (jac_reg_weight=1e-2) onto `iterated` — but on the moving target that only pulled the
# Jacobian ρ from 1.778 → 1.026 (STILL >1, frac_expanding 0.47). So that run tested "a still-
# EXPANDING loop doesn't crack OOD", NOT "a CONTRACTIVE loop doesn't". A convergent map contracts
# cheaply; a non-convergent CA resists it, so it needs a heavier weight. This screen sweeps up from
# the converge elbow to find the smallest weight giving spectral_radius_mean < 1 on `iterated`.
#
# READ (from *_diagnostics.csv): the smallest weight with spectral_radius_mean<1 AND frac_expanding
# →0 is the iterated elbow to pin into m27_stable_iterated_extrap. If NO weight reaches ρ<1 without
# collapsing accuracy to baseline, report THAT (contraction may be unreachable on a moving target
# without destroying the fit — itself an informative bound). `trm` (weight 0) is the control.

task:
  name: iterated
  params:
    w: 9
    T: 8
    rule: 30
    distractors: 4
  n_train: 4000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

arms:
  - name: trm
    label: trm                 # weight 0 — the non-contractive control
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
  - name: trm
    label: trm_stable_3e-2
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
    jac_reg_weight: 3.0e-2
  - name: trm
    label: trm_stable_1e-1
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
    jac_reg_weight: 1.0e-1
  - name: trm
    label: trm_stable_3e-1
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
    jac_reg_weight: 3.0e-1
  - name: trm
    label: trm_stable_1e0
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    deep_supervision: true
    jac_reg_weight: 1.0

deltas:
  - [trm_stable_3e-2, trm]
  - [trm_stable_1e-1, trm]
  - [trm_stable_3e-1, trm]
  - [trm_stable_1e0, trm]

budget_reference: trm            # every stable arm is param-IDENTICAL to trm (ratio 1.000)
budget_tol: 0.02

diagnostics:
  enabled: true                  # ρ / operator-norm / za_alignment / over-unroll drop side-car
  overunroll_factor: 4
  n_random_inits: 5
  power_iter_steps: 20
  jac_n_examples: 8

train:
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
