# M29b — the DS-mechanism re-test on the GENUINELY-HARD `nested_converge` @ 4k regime, where the
# mixer PLATEAUS (EM ≈ 0.79 @ w24, M28) even at full 100-epoch training — so DS has real headroom
# WITHOUT undertraining (unlike m29a). This is the more decisive regime: if the detached-carry N_sup
# mechanism ever helps the mixer, a hard unsaturated target is where it should show.
#
# Same two-sense structure as m29a (Part A per-step DS = Δ(mixer_ds − mixer_nods); Part B N_sup pivot
# on mixer_nods; flat replication in-run) plus the M28 headline sanity Δ(mixer_ds − ff-equiv... here
# flat_nods). nested_converge = two-timescale fixed point (inner=13 block-ring relax, outer=79 full
# ring), local+deep+ff-hard, cross-cell coupled. distractors=0 EVERY arm (mixer divisibility). w24
# (n_blocks=3) first per tiny-first; w32 is a cheap add-on if a signal appears. The 4×-epoch control
# is m29b_..._4xep.yaml (400 epochs). num_threads=1 (mixer/decoupled 3-D matmul).
#
# NB this does NOT re-open Task C: M28b already showed the mixer plateaus at 4k and its non-recurrent
# control shares the ceiling (data is the lever, M18j). Here nested is purely the unsaturated stage on
# which to read the DS mechanism — a within-config Δ, not an H/L gate.
task:
  name: nested_converge
  params:
    block_w: 8
    inner_rule: 13
    outer_rule: 79
    n_blocks: 3          # w = 24
    T: 6
    distractors: 0
  n_train: 4000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

arms:
  - name: trm_mixer
    label: mixer_ds
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 48
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm_mixer
    label: mixer_nods               # PIVOT: per-step DS OFF, n_sup=1
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 48
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: false
  - name: trm_mixer
    label: mixer_nsup               # detached-carry N_sup mechanism (carry ON)
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 48
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: false
    n_sup: 4
    n_sup_carry: true
  - name: trm_mixer
    label: mixer_nsup_nocarry       # compute-matched control (carry OFF)
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 48
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: false
    n_sup: 4
    n_sup_carry: false
  - name: trm
    label: flat_nods                # flat reference (budget anchor)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: false
  - name: trm
    label: flat_nsup                # M18 replication on the flat loop (carry ON)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: false
    n_sup: 4
    n_sup_carry: true
  - name: trm
    label: flat_nsup_nocarry        # M18e replication (carry OFF)
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: false
    n_sup: 4
    n_sup_carry: false

deltas:
  - [mixer_ds, mixer_nods]              # Part A: per-step-readout DS load-bearing for the mixer?
  - [mixer_nsup, mixer_nsup_nocarry]    # Part B: the detached CARRY mechanism (mixer)
  - [mixer_nsup_nocarry, mixer_nods]    # raw 4× compute (mixer)
  - [mixer_nsup, mixer_nods]            # full N_sup "win" (mixer)
  - [flat_nsup, flat_nsup_nocarry]      # M18e replication: carry inert on the flat loop in-run?
  - [flat_nsup, flat_nods]              # M18c replication: the flat N_sup "win"

budget_reference: flat_nods
budget_tol: 0.05

train:
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu
  num_threads: 1

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
