# M29b (4×-epoch control) — the "is N_sup just more training?" diagnostic for m29b (M18f-style, own
# config since epochs is global). Same task/seeds/arms as m29b but at 4× the base epochs (100 → 400):
# compare mixer_nods_4xep@400 against mixer_nsup@100 from m29b (same seeds/task). If they match, the
# N_sup pass-structure buys nothing a plain longer run doesn't — the M18 verdict on the mixer.
task:
  name: nested_converge
  params:
    block_w: 8
    inner_rule: 13
    outer_rule: 79
    n_blocks: 3          # w = 24
    T: 6
    distractors: 0
  n_train: 4000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

arms:
  - name: trm_mixer
    label: mixer_nods_4xep
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 48
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: false
  - name: trm
    label: flat_nods_4xep
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: false

train:
  epochs: 400           # 4× the m29b base (100)
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu
  num_threads: 1

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
