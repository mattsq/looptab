# M17 SMOKE — validate the nested_converge pipeline end-to-end (1 seed, few epochs). NOT a result.
task:
  name: nested_converge
  params:
    block_w: 8
    inner_rule: 13
    outer_rule: 79
    T: 6
    distractors: 8
  n_train: 2000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

grid:
  params:
    n_blocks: [3]   # w = 24

curriculum:
  param: T
  T_min: 1
  T_max: 6

couple_n_steps_to_param: T

arms:
  - name: trm
    label: trm_nods
    hidden_dim: 64
    latent_dim: 64
    n_steps: 6
    deep_supervision: false
    ds_mode: final
  - name: ff_matched
    label: ff_matched
    hidden_dim: 64
    latent_dim: 64
    n_steps: 6

deltas:
  - [trm_nods, ff_matched]

budget_reference: trm_nods
budget_tol: 0.02

train:
  epochs: 20
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

seeds: [0]
parallel_workers: 1
results_dir: results
