# M2 deliverable: add the depth/compute-matched untied control (§4b) to the parity
# sweep, so we can ask whether the loop's M0 edge is weight-tied *recurrence* or
# merely *depth*. Re-runs the M0 k-vs-accuracy curve with a fourth arm.
#
# Five arms (one knob per Δ, §5.6):
#   trm_ds         - TRM loop WITH deep supervision
#   trm_nods       - TRM loop WITHOUT deep supervision (isolates the loop alone)
#   untied_stack   - same block stacked n_steps× WITHOUT weight tying, no DS (§4b);
#                    depth/compute-matched but ~n_steps× TRM's params (capacity NOT held)
#   untied_matched - the same untied stack width-shrunk so total params ≈ TRM's, no DS;
#                    the CLEAN tying control — capacity AND depth fixed, only tying varies
#   ff_matched     - param-matched feedforward control (§4a)
#
# THE clean M2 Δ is Δ(trm_nods − untied_matched): weight tying at a *fixed parameter
# budget* and fixed depth. Δ(trm_nods − untied_stack) is the confounded version (tying +
# ~4× capacity) kept for completeness; Δ(untied_matched − ff_matched) isolates depth at
# fixed capacity (deep untied vs shallow MLP, same budget).

task:
  name: parity
  params:
    d: 20
  n_train: 4000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

sweep:
  param: k
  values: [2, 3, 4]

arms:
  - name: trm
    label: trm_ds
    hidden_dim: 64
    latent_dim: 64
    n_steps: 4
    deep_supervision: true
    deep_supervision_weight: 1.0
  - name: trm
    label: trm_nods
    hidden_dim: 64
    latent_dim: 64
    n_steps: 4
    deep_supervision: false
    deep_supervision_weight: 0.0
  - name: untied_stack
    label: untied_stack
    hidden_dim: 64
    latent_dim: 64
    n_steps: 4
    deep_supervision: false
    deep_supervision_weight: 0.0
  - name: untied_matched
    label: untied_matched
    hidden_dim: 64
    latent_dim: 64
    n_steps: 4
    deep_supervision: false
    deep_supervision_weight: 0.0
  - name: ff_matched
    label: ff_matched
    hidden_dim: 64
    latent_dim: 64
    n_steps: 4

deltas:
  - [trm_nods, untied_matched] # CLEAN M2: weight tying at fixed capacity + depth
  - [trm_nods, untied_stack]   # confounded: tying + ~4× capacity (kept for completeness)
  - [untied_matched, ff_matched] # depth at fixed capacity (deep untied vs shallow MLP)
  - [trm_nods, ff_matched]     # the loop alone vs param-matched control (M0 delta)
  - [trm_ds, trm_nods]         # deep supervision alone

train:
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

seeds: [0, 1, 2, 3, 4]
results_dir: results
