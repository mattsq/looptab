# M28b — nested_converge mixer DATA SWEEP, point 2 of 3 (n_train=16000). LEAN triple only
# (trm_mixer / trm_flat / ff_matched) to bound compute; the 4k point is the same triple in
# m28b_nested_converge_mixer.yaml, and 64k is m28b_nested_data64k.yaml.
#
# M18h/M18j traced the FLAT single loop's nested plateau vs data: EM 0.75 (4k) → 0.93 (16k) → 0.99
# (64k) — the "data is the lever" finding that kept M19 unearned. This sweep traces the MIXER's curve
# against it: if the mixer sits at/near ~1.0 already at 4k–16k (solving where the flat loop still
# climbs), the M18 plateau was flat-arch + data-bound and Task C stays closed on the mixer too. Same
# arm settings / recipe as the 4k mechanism config so the triple is comparable across n_train.
# distractors=0 (mixer divisibility); num_threads=repo-default 1; grid n_blocks [3,4] ⇒ w 24/32.
task:
  name: nested_converge
  params:
    block_w: 8
    inner_rule: 13
    outer_rule: 79
    T: 6
    distractors: 0
  n_train: 16000
  n_test: 1000
  task_seed: 42
  train_sample_seed: 1
  test_sample_seed: 2

grid:
  params:
    n_blocks: [3, 4]   # w = 24, 32

arms:
  - name: trm_mixer
    label: trm_mixer
    hidden_dim: 96
    latent_dim: 64
    token_hidden: 48
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: trm
    label: trm_flat
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8
    n_latent: 1
    use_rmsnorm: true
    deep_supervision: true
  - name: ff_matched
    label: ff_matched
    hidden_dim: 64
    latent_dim: 64
    n_steps: 8

deltas:
  - [trm_mixer, ff_matched]   # mixer vs shallow MLP at 16k data
  - [trm_mixer, trm_flat]     # mixing marginal at 16k data
  - [trm_flat, ff_matched]    # flat loop ~ ff sanity

train:
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  batch_size: 256
  device: cpu

budget_reference: trm_flat
budget_tol: 0.05

seeds: [0, 1, 2, 3, 4, 5, 6, 7]
parallel_workers: 4
results_dir: results
